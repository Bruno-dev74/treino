<style>

.ex{font-weight:800}.meta{display:block;font-size:13px;color:var(--muted);margin-top:2px}.play{width:42px;height:36px;padding:0;display:grid;place-items:center;background:#7f1d1d;border-color:#ef4444;color:white;font-size:16px}.play.search{background:#334155;border-color:#64748b}
details{margin:8px 0 0 30px;border-left:3px solid var(--gold);padding-left:10px}summary{cursor:pointer;color:#fde68a;font-weight:700;font-size:13px}

outube.com/shorts/71SC5HHlDrk"},"Levantamento terra romeno":{url:"https://www.youtube.com/shorts/hu3jRvTc_po"},"Step-up":{url:"https://www.youtube.com/shorts/z7YBQi6rW28"},"Panturrilha em pé":{url:"https://www.youtube.com/shorts/rsOLKY02m70"},"Wall sit":{url:"https://www.youtube.com/shorts/mDdLC-yKudY"},"Circuito 3 voltas":{url:""},"EMOM 6":{url:""}};
const how={

rás inclinando o tronco.","Volte contraindo glúteo e posterior."],"Flexão inclinada":["Mãos em mesa ou sofá firme.","Corpo em linha reta.","Desça o peito em direção ao apoio.","Empurre até esticar os braços."],"Flexão":["Mãos um pouco mais abertas que os ombros.","Corpo em linha reta.","Desça o peito perto do chão.","Suba empurrando o chão. Use joelhos se precisar."],"Thruster":["Halteres nos ombros.","Faça um agachamento controlado.","Na subida, empurre os pesos acima da cabeça.","Volte aos ombros e repita."],"Deadlift":["Peso perto dos pés.","Dobre o quadril para trás com coluna reta.","Suba estendendo quadril e joelhos.","Desça mantendo o peso perto do corpo."],"Burpee ou meio-burpee":["Agache e apoie as mãos.","Leve os pés para trás em prancha.","Volte os pés para perto das mãos.","Levante. No completo, inclua flexão e salto."],"Mountain climber":["Fique em prancha alta.","Traga um joelho ao peito.","Alterne as pernas.","Não deixe o quadril subir demais."],"Dead hang":["Pendure-se na barra.","Braços esticados.","Abdômen levemente contraído.","Segure sem dor no ombro."],"Negativa na barra":["Suba com ajuda de cadeira.","Comece com o queixo acima da barra.","Desça o mais devagar possível.","Pare antes de perder o controle."],"Escápula na barra":["Pendure-se com braços esticados.","Puxe os ombros para baixo sem dobrar cotovelos.","O corpo sobe pouco.","Desça controlado."],"Rosca martelo":["Palmas viradas uma para a outra.","Cotovelos colados ao corpo.","Suba os pesos até perto dos ombros.","Desça sem balançar."],"Encolhimento":["Pesos ao lado do corpo.","Suba os ombros em direção às orelhas.","Segure 1 segundo no alto.","Desça sem girar o ombro."],"Prancha lateral":["Apoie um cotovelo no chão.","Corpo de lado e alinhado.","Eleve o quadril.","Segure e troque o lado."],"Afundo alternado":["Dê um passo à frente.","Desça dobrando os dois joelhos.","Volte empurrando a perna da frente.","Alterne mantendo o tronco firme."],"Afundo búlgaro":["Pé de trás apoiado em cadeira firme.","Pé da frente bem apoiado.","Desça devagar.","Suba empurrando o calcanhar da frente."],"Ponte de glúteo":["Deite com joelhos dobrados.","Pés no chão próximos ao quadril.","Eleve o quadril contraindo glúteo.","Desça controlando."],"Mobilidade de tornozelo/quadril":["Faça círculos lentos com o quadril.","Avance um joelho mantendo o pé inteiro no chão.","Alterne os lados.","Faça leve, como aquecimento."],"Levantamento terra romeno":["Pesos na frente do corpo.","Joelhos levemente dobrados.","Jogue o quadril para trás descendo os pesos.","Volte contraindo posterior e glúteo."],"Step-up":["Use cadeira ou degrau firme.","Coloque um pé inteiro em cima.","Suba empurrando a perna do apoio.","Desça devagar."],"Panturrilha em pé":["Pés paralelos.","Suba na ponta dos pés.","Segure 1 segundo no topo.","Desça devagar."],"Wall sit":["Costas na parede.","Desça como se estivesse sentado.","Joelhos perto de 90 graus.","Segure sem apoiar as mãos nas pernas."],"Circuito 3 voltas":["Faça os exercícios em sequência.","Complete 10 agachamentos, 10 remadas e 8 push press.","Descanse 60 segundos no fim da volta.","Repita 3 vezes."],"EMOM 6":["A cada minuto começa uma tarefa.","Minuto 1: flexões.","Minuto 2: squats.","Minuto 3: prancha. Repita até 6 minutos."]

const tabs={
a:{title:"A - Força com halteres/barra",desc:"Base para ganhar força geral: perna, costas, ombro e pegada.",cards:[["Aquecimento",[["Agachamento livre","2x15"],["Rotação de ombro","2x20s"],["Prancha","2x25s"]]],["Força",[["Goblet squat","4x12"],["Remada curvada","4x12"],["Desenvolvimento militar","4x8-10"],["Clean and press","4x6"]]],["Final",[["Farmer hold","4x40s"],["Circuito 3 voltas","10 agachamentos + 10 remadas + 8 push press"]]]]},

const defaults={1:"A - Força",2:"D - Sem halteres",3:"E - Pernas",4:"Caminhada ou descanso",5:"B - Crossfit ou C - Barra",6:"Descanso",0:"Descanso"};
const options=["Descanso","A - Força","B - Crossfit","C - Barra","D - Sem halteres","E - Pernas","Caminhada ou descanso"];
let exerciseTimer=null,restTimer=null,exerciseElapsed=0,restLeft=0,restTarget=60;

function getSetting(k,d){return localStorage.getItem("cfg-"+k)??d}
function setSetting(k,v){localStorage.setItem("cfg-"+k,v);syncTimerLabels()}
function getExerciseTarget(){return Math.max(1,Math.min(15,Number(getSetting("exerciseMin","5"))))*60}
function setExerciseMin(v){const val=Math.max(1,Math.min(15,Number(v)||5));setSetting("exerciseMin",val);document.querySelectorAll(".exerciseMinInput").forEach(i=>i.value=val);syncTimerLabels()}
function timerHtml(){return `<div class="timerPanel"><div class="timerGrid"><div class="timerMini"><div class="timerTitle">Exercício</div><div class="targetLine"><span class="targetIcon">⏱</span><input class="exerciseMinInput" type="number" min="1" max="15" step="1" value="${getSetting("exerciseMin","5")}" onchange="setExerciseMin(this.value)"><span class="unit">min</span></div><div class="timebox exTime">00:00 / 05:00</div><div class="miniBtns"><button onclick="startExerciseTimer()">Iniciar</button><button onclick="stopExerciseTimer()">Pausar</button><button onclick="resetExerciseTimer()">Zerar</button></div><div class="bar"><div class="fill exFill"></div></div></div><div class="timerMini"><div class="timerTitle">Descanso</div><div class="timebox restTime">60s</div><div class="miniBtns"><button onclick="startRestTimer(60)">60</button><button onclick="startRestTimer(90)">90</button><button onclick="startRestTimer(120)">120</button><button onclick="startRestTimer(150)">150</button><button onclick="resetRestTimer()">Zerar</button></div><div class="bar"><div class="restFill"></div></div></div></div></div>`}
function pad(n){return String(n).padStart(2,"0")}function mmss(s){return `${pad(Math.floor(s/60))}:${pad(s%60)}`}
function syncTimerLabels(){const target=getExerciseTarget();document.querySelectorAll(".exTime").forEach(e=>e.textContent=`${mmss(exerciseElapsed)} / ${mmss(target)}`);document.querySelectorAll(".restTime").forEach(e=>e.textContent=(restLeft||restTarget)+"s");document.querySelectorAll(".exFill").forEach(f=>f.style.width=Math.min(100,exerciseElapsed/target*100)+"%");document.querySelectorAll(".restFill").forEach(f=>f.style.width=restLeft?((restTarget-restLeft)/restTarget*100)+"%":"0%")}
function startExerciseTimer(){clearInterval(exerciseTimer);const target=getExerciseTarget();exerciseTimer=setInterval(()=>{exerciseElapsed++;syncTimerLabels();if(exerciseElapsed>=target){stopExerciseTimer();if(getSetting("autoRest","1")==="1")startRestTimer(restTarget)}},1000)}
function stopExerciseTimer(){clearInterval(exerciseTimer)}
function resetExerciseTimer(){stopExerciseTimer();exerciseElapsed=0;syncTimerLabels()}
function startRestTimer(seconds){clearInterval(restTimer);restTarget=seconds||restTarget;restLeft=restTarget;syncTimerLabels();restTimer=setInterval(()=>{restLeft--;syncTimerLabels();if(restLeft<=0){resetRestTimer()}},1000)}
function stopRestTimer(){clearInterval(restTimer)}
function resetRestTimer(){stopRestTimer();restLeft=0;syncTimerLabels()}

function searchUrl(name){return "https://www.youtube.com/results?search_query="+encodeURIComponent(name)}
function videoId(url){let m=url.match(/shorts\/([^?&/]+)/)||url.match(/[?&]v=([^?&]+)/);return m?m[1]:""}
function openVideo(name){const v=videos[name];if(!v||!v.url){window.open(searchUrl(name),"_blank");return}const id=videoId(v.url);document.getElementById("modalTitle").textContent=name;document.getElementById("player").src="https://www.youtube.com/embed/"+id+"?autoplay=1&mute=1&rel=0";document.getElementById("modal").classList.add("open")}
function closeVideo(){document.getElementById("modal").classList.remove("open");document.getElementById("player").src=""}
function item(name,meta){const steps=how[name]||["Faça com controle.","Mantenha abdômen firme.","Pare se sentir dor aguda."];const has=videos[name]&&videos[name].url;return `<div class="item"><div class="row"><label><input type="checkbox"><span><span class="ex">${name}</span><span class="meta">${meta}</span></span></label><button class="videoBtn play ${has?'':'search'}" onclick="openVideo('${name.replaceAll("'","\\'")}')">${has?'▶':'⌕'}</button></div><details><summary>Como fazer</summary><ol>${steps.map(s=>`<li>${s}</li>`).join("")}</ol></details></div>`}
function startOfWeek(date){const d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d}
function fmt(d){return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}
function weekKey(){const s=startOfWeek(new Date());return `${s.getFullYear()}-${s.getMonth()+1}-${s.getDate()}`}
function dayWorkout(dow){return localStorage.getItem(`${weekKey()}-workout-${dow}`)||defaults[dow]}
function setDayWorkout(dow,value){localStorage.setItem(`${weekKey()}-workout-${dow}`,value);renderAgenda()}
function renderAgenda(){
 const start=startOfWeek(new Date()),today=new Date();today.setHours(0,0,0,0);
 const names=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"],dows=[1,2,3,4,5,6,0],key=weekKey();
 const cards=dows.map((dow,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);const id=`${key}-${dow}`,done=localStorage.getItem("hist-"+id)==="1",wk=dayWorkout(dow),isToday=d.getTime()===today.getTime();return `<div class="day ${isToday?'today':''}"><div class="dayName">${names[i]}</div><div class="date">${fmt(d)}</div><span class="workoutTag">${wk}</span><select onchange="setDayWorkout(${dow},this.value)">${options.map(o=>`<option ${wk===o?'selected':''}>${o}</option>`).join("")}</select><label class="done"><input type="checkbox" ${done?'checked':''} onchange="localStorage.setItem('hist-${id}',this.checked?'1':'0')"><span>Feito</span></label></div>`}).join("");
 document.getElementById("agenda").innerHTML=`<div class="card"><h2>Agenda semanal</h2><p>Semana de ${fmt(start)} até ${fmt(new Date(start.getFullYear(),start.getMonth(),start.getDate()+6))}</p><div class="schedule">${cards}</div></div>`;
}
function renderConfig(){
 document.getElementById("config").innerHTML=`<div class="card"><h2>Configurações</h2><div class="settings"><div class="card"><h2>Timer exercício</h2><div class="settingLine"><span>Tempo alvo</span><span>${getSetting("exerciseMin","5")} min</span></div><p>O tempo do exercício também pode ser alterado direto no bloco do treino.</p></div><div class="card"><h2>Automação</h2><label><input type="checkbox" ${getSetting("autoRest","1")==="1"?"checked":""} onchange="setSetting('autoRest',this.checked?'1':'0')"><span>Descanso automático</span></label></div></div></div>`;
}
function render(){
 Object.keys(tabs).forEach(id=>{const t=tabs[id],el=document.getElementById(id);el.innerHTML=`<div class="card wide"><div class="headerTop"><div><h2>${t.title}</h2><p>${t.desc}</p></div>${timerHtml()}</div></div>${t.cards.map(c=>`<div class="card"><h2>${c[0]}</h2>${c[1].map(e=>item(e[0],e[1])).join("")}</div>`).join("")}`});
 renderAgenda();renderConfig();syncTimerLabels();
 const checks=[...document.querySelectorAll('section:not(#agenda) input[type="checkbox"]')];checks.forEach((c,i)=>{const k="treino-check-v4-"+i;c.checked=localStorage.getItem(k)==="1";c.onchange=()=>localStorage.setItem(k,c.checked?"1":"0")});window.allChecks=checks;
}
function showTab(id,btn){document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");scrollTo({top:0,behavior:"smooth"});syncTimerLabels()}
function resetChecks(){(window.allChecks||[]).forEach((c,i)=>{c.checked=false;localStorage.removeItem("treino-check-v4-"+i)})}
render();
</script>
</body>
</html>
